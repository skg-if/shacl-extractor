name: Deploy documentation

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - run: uv sync --locked --dev

      - name: Find latest successful test run
        id: find-run
        run: |
          RUN_ID=$(gh run list --repo "${{ github.repository }}" --workflow "Tests" --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download coverage report
        if: steps.find-run.outputs.run-id != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-report
          path: docs/_build/html/coverage
          run-id: ${{ steps.find-run.outputs.run-id }}
          github-token: ${{ github.token }}
        continue-on-error: true

      - name: Download coverage badge
        if: steps.find-run.outputs.run-id != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-badge
          path: docs/_build/html/coverage
          run-id: ${{ steps.find-run.outputs.run-id }}
          github-token: ${{ github.token }}
        continue-on-error: true

      - name: Build documentation
        run: uv run jupyter-book build docs

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
